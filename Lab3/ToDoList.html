<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>To Do List(Dynamic)</title>
</head>

<body>
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
    </head>

    <body>
        <div class="main_container">
            <form class="todo_form_class" id="todo_form_id">
                <label for="todo-input">Super Duper To Do List</label>
                <div class="input_group_class">
                    <input type="text" id="todo-input" placeholder="Write a new task" required>
                    <button type="submit">Add</button>
                </div>
            </form>
            <ul id="todo-list" class="todo_list_class">
            </ul>
        </div>

        <script src="javascript.js"></script>
    </body>

    </html>
